name: Assistant Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/assistant-backend/**'
      - '!apps/assistant-backend/*.md'
      - '!apps/assistant-backend/**/*.md'
      - '.github/workflows/assistant-backend-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/assistant-backend/**'
      - '!apps/assistant-backend/*.md'
      - '!apps/assistant-backend/**/*.md'
      - '.github/workflows/assistant-backend-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/assistant-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'apps/assistant-backend/pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest -v

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/assistant-backend/coverage.xml
          flags: assistant-backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
