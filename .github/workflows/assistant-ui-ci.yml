name: Assistant UI CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/assistant-ui/**'
      - '!apps/assistant-ui/*.md'
      - '!apps/assistant-ui/**/*.md'
      - '.github/workflows/assistant-ui-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/assistant-ui/**'
      - '!apps/assistant-ui/*.md'
      - '!apps/assistant-ui/**/*.md'
      - '.github/workflows/assistant-ui-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/assistant-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/assistant-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
