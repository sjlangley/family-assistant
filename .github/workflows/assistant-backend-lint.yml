name: Assistant Backend Lint

on:
  push:
    branches: [main]
    paths:
      - 'apps/assistant-backend/**'
      - '!apps/assistant-backend/*.md'
      - '!apps/assistant-backend/**/*.md'
      - '.github/workflows/assistant-backend-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/assistant-backend/**'
      - '!apps/assistant-backend/*.md'
      - '!apps/assistant-backend/**/*.md'
      - '.github/workflows/assistant-backend-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/assistant-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'apps/assistant-backend/pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check code style with ruff
        run: ruff check src/

      - name: Check code formatting with ruff
        run: ruff format --check src/

      - name: Check type safety with pyrefly
        run: pyrefly check src/
